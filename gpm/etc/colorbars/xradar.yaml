---
reflectivity:
  cmap:
    name: Spectral_r
    bad_alpha: 1
    bad_color: none
  norm:
    name: Norm
    vmin: -10
    vmax: 65
  cbar:
    extend: both
    extendfrac: 0.05
    label: Reflectivity [$dBZ$]
  auxiliary:
    category: [reflectivity, radar]
differential_reflectivity:
  cmap:
    name: Spectral_r
    bad_alpha: 0.5
    bad_color: none
  norm:
    name: Norm
    vmin: -1
    vmax: 8
  cbar:
    extend: both
    extendfrac: 0.05
    label: Differential Reflectivity [$dB$]
  auxiliary:
    category: [reflectivity, radar]
differential_phase:
  cmap:
    name: twilight_shifted
    bad_color: none
  norm:
    name: Norm # -180, 180 if unwrapped, 0 to unbounded if unwrapped
    vmin: 0
    vmax: 180 #
  cbar:
    extend: neither
    label: Total Differential Phase ($\phi_{dp}$)  [$°$]
  auxiliary:
    category: [phase, radar]
propagation_differential_phase:
  cmap:
    name: Spectral_r
    bad_color: none
  norm:
    name: Norm
    vmin: 0
    vmax: 360 # can be more ... unbounded
  cbar:
    extend: neither
    label: Propagation Differential Phase ($\psi_{dp}$)  [$°$]
  auxiliary:
    category: [phase, radar]
specific_differential_phase:
  cmap:
    name: Spectral_r
    bad_color: none
  norm:
    name: Norm
    vmin: -2
    vmax: 5
  cbar:
    extend: both
    extendfrac: 0.05
    label: Specific Differential Phase ($K_{dp}$) [$°/km$]
  auxiliary:
    category: [phase, radar]
cross_correlation_ratio:
  cmap:
    name: Spectral_r
    bad_color: none
  norm:
    name: Norm
    vmin: 0
    vmax: 1
  cbar:
    extend: neither
    label: Correlation between $Z_{H}$ and $Z_{V}$ ($\rho_{hv}$)
  auxiliary:
    category: [radar]
clutter_correction:
  cmap:
    name: Spectral_r
    bad_alpha: 0.5
    bad_color: gray
    under_color: none
  norm:
    name: Norm
    vmin: -7
    vmax: 1
  cbar:
    extend: max
    extendfrac: 0.05
    label: Clutter correction
  auxiliary:
    category: [radar]
specific_attenuation:
  cmap:
    name: Spectral_r
    bad_color: none
  norm:
    name: LogNorm
    vmin: 0.001
  cbar:
    extend: max
    extendfrac: 0.05
    label: Specific_attenuation [$dB/km$]
  auxiliary:
    category: [radar]
specific_differential_attenuation:
  cmap:
    name: RdPu
    bad_color: none
  norm:
    name: LogNorm
    vmin: 0.001
  cbar:
    extend: max
    extendfrac: 0.05
    label: Specific Differential Attenuation ($A_{dp}$) [$dB/km$]
  auxiliary:
    category: [radar]
path_integrated_attenuation:
  cmap:
    name: RdPu
    bad_color: none
  norm:
    name: Norm
    vmin: 0
    vmax: 8
  cbar:
    extend: max
    extendfrac: 0.05
    label: Path Integrated Attenuation ($PIA$) [$dB$]
  auxiliary:
    category: [radar]
path_integrated_differential_attenuation:
  cmap:
    name: RdPu
    bad_color: none
  norm:
    name: Norm
    vmin: 0
    vmax: 2
  cbar:
    extend: max
    extendfrac: 0.05
    label: Path Integrated Differential Attenuation ($PIDA$) [$dB$]
  auxiliary:
    category: [radar]
linear_depolarization_ratio:
  cmap:
    name: Spectral_r # pyart_SCook18
    bad_color: none
  norm:
    name: Norm
    vmin: -40
    vmax: 0
  cbar:
    extend: min
    extendfrac: 0.05
    label: Depolarization Ratio [$dB$]
  auxiliary:
    category: [radar]
normalized_coherent_power:
  cmap:
    name: Spectral_r # pyart_Carbone17
    bad_color: none
  norm:
    name: Norm
    vmin: 0
    vmax: 1
  cbar:
    extend: neither
    label: Signal Quality Index [-]
  auxiliary:
    category: [radar]
signal_to_noise_ratio:
  cmap:
    name: Spectral_r # pyart_Carbone17
    bad_color: none
  norm:
    name: Norm
    vmin: -20
    vmax: 30
  cbar:
    extend: both
    extendfrac: 0.05
    label: Signal to Noise Ratio [$dB$]
  auxiliary:
    category: [radar]
TH:
  reference: reflectivity
TV:
  reference: reflectivity
DBZH:
