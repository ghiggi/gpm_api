---
name: Tests Windows
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'  # Run at 00:00 UTC on the 1st day of every month

jobs:
  tests:
    name:
      Test on ${{ matrix.os }}, Python ${{ matrix.python-version }}${{ matrix.experimental && ' with latest dependencies' || '' }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        experimental: [false]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up micromamba and install package dependencies
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: ${{ matrix.experimental && 'ci/environment_latest.yaml' || 'ci/environment.yaml' }}
          create-args: >-
            python=${{ matrix.python-version }}
          init-shell: >-
            bash
      - name: Install the package
        run: |
          pip uninstall -y matplotlib  # have matplotlib reinstalled for consistent plotting tests
          pip install -e ".[dev]"
      - name: Test with pytest
        run: |-
          pytest
